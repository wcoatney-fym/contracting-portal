[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20"
# VITE_-prefixed vars are intentionally inlined into the client bundle by Vite.
# Netlify secret scanning flags them; acknowledge the known client-exposed keys
# so the build can ship. NOTE: VITE_SERVICE_PASSWORD ships to the client by design
# of the current shared-service-account auth — tracked for a server-side fix.
SECRETS_SCAN_OMIT_KEYS = "VITE_SERVICE_PASSWORD,VITE_SERVICE_EMAIL,VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_APP_URL"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200